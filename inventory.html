<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager - DRRAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fa-solid fa-hand-holding-heart"></i> DRRAS
        </div>
        <button class="menu-toggle" id="menuToggle">
            <i class="fa-solid fa-bars"></i>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="affected-areas.html">Affected Areas</a></li>
            <li><a href="resource-requests.html">Requests</a></li>
            <li><a href="resource-allocation.html">Allocation</a></li>
            <li><a href="dispatch.html">Dispatch</a></li>
            <li><a href="delivery-report.html">Deliveries</a></li>
            <li><a href="inventory.html" class="active">Inventory</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="page-header">
            <div>
                <h1>Current Inventory</h1>
                <p>Status of available resources across all relief centers</p>
            </div>
            <button class="btn btn-primary" onclick="alert('Feature coming soon: Add Inventory Entry')">
                <i class="fa-solid fa-plus"></i> Update Inventory
            </button>
        </div>

        <div class="card">
            <div class="table-container">
                <table class="data-table" id="inventoryTable">
                    <thead>
                        <tr>
                            <th>Relief Center ID</th>
                            <th>Resource ID</th>
                            <th>Resource Name</th>
                            <th>Available Quantity</th>
                            <th>Reserved Buffer Quantity</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryList">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/shared.js"></script>
    <script src="js/inventory.js"></script>
</body>

</html>
