<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Allocation - DRRAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .split-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .split-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fa-solid fa-hand-holding-heart"></i> DRRAS
        </div>
        <button class="menu-toggle" id="menuToggle">
            <i class="fa-solid fa-bars"></i>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="affected-areas.html">Affected Areas</a></li>
            <li><a href="resource-requests.html">Requests</a></li>
            <li><a href="resource-allocation.html" class="active">Allocation</a></li>
            <li><a href="dispatch.html">Dispatch</a></li>
            <li><a href="delivery-report.html">Deliveries</a></li>
            <li><a href="inventory.html">Inventory</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="page-header">
            <div>
                <h1>Resource Allocation</h1>
                <p>Assign available inventory to pending requests</p>
            </div>
        </div>

        <div class="split-layout">
            <div class="card">
                <h2>Allocation Form</h2>
                <form id="allocationForm">
                    <div class="form-group">
                        <label class="form-label" for="reqId">Pending Request ID</label>
                        <select class="form-control" id="reqId" required>
                            <option value="">Select a Request...</option>
                            <!-- Populated by JS -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="centerId">Relief Center</label>
                        <select class="form-control" id="centerId" required>
                            <option value="">Select Source Center...</option>
                            <!-- Populated by JS -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="allocatedQuantity">Allocated Quantity</label>
                        <input type="number" class="form-control" id="allocatedQuantity" min="1" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="allocationDate">Allocation Date</label>
                        <input type="date" class="form-control" id="allocationDate" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%">
                        <i class="fa-solid fa-boxes-packing"></i> Confirm Allocation
                    </button>
                </form>
            </div>

            <div class="card">
                <h2>Recent Allocations</h2>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Allocation ID</th>
                                <th>Request ID</th>
                                <th>Center ID</th>
                                <th>Qty</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="allocationsList">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/shared.js"></script>
    <script src="js/resource-allocation.js"></script>
</body>

</html>
